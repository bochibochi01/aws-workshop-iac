AWSTemplateFormatVersion: '2010-09-09'

Description: Workshop Database

Resources:

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup

    Properties:

      DBSubnetGroupDescription: Workshop DB Subnet Group

      SubnetIds:
        - !ImportValue WorkshopPublicSubnet1A
        - !ImportValue WorkshopPublicSubnet1C

      Tags:
        - Key: Name
          Value: WorkshopDBSubnetGroup


  WorkshopDatabase:
    Type: AWS::RDS::DBInstance

    DeletionPolicy: Delete

    Properties:

      DBInstanceIdentifier: workshop-db

      Engine: mysql

      EngineVersion: "8.0.35"

      DBInstanceClass: db.t3.micro

      AllocatedStorage: 20

      MasterUsername: admin

      MasterUserPassword: Password123!

      PubliclyAccessible: true

      StorageType: gp2

      BackupRetentionPeriod: 0

      DeletionProtection: false

      DBSubnetGroupName:
        !Ref DatabaseSubnetGroup

      Tags:
        - Key: Name
          Value: WorkshopDB


Outputs:

  DatabaseEndpoint:
    Description: Database Endpoint

    Value: !GetAtt WorkshopDatabase.Endpoint.Address

  DatabasePort:
    Description: Database Port

    Value: !GetAtt WorkshopDatabase.Endpoint.Port
