AWSTemplateFormatVersion: '2010-09-09'

Description: Workshop Compute

Resources:

  DemoSecurityGroup:
    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: Demo Security Group

      VpcId: !ImportValue WorkshopVPC

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  DemoInstance:
    Type: AWS::EC2::Instance

    Properties:

      InstanceType: t3.micro

      ImageId: ami-0d52744d6551d851e

      SubnetId: !ImportValue WorkshopPublicSubnet1A

      SecurityGroupIds:
        - !Ref DemoSecurityGroup

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash

          dnf update -y

          dnf install java-17-amazon-corretto -y

          mkdir -p /opt/workshop

          echo "Java installed" > /opt/workshop/setup.txt

      Tags:
        - Key: Name
          Value: WorkshopApp

Outputs:

  InstanceId:
    Value: !Ref DemoInstance

  SecurityGroupId:
    Value: !Ref DemoSecurityGroup
