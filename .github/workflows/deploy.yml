name: IaC Demo

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Validate Network Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/network.yaml

      - name: Validate Compute Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/compute.yaml

  deploy:

    needs: validate

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy Network
        run: |
          aws cloudformation deploy \
            --stack-name workshop-network \
            --template-file cloudformation/network.yaml

      - name: Deploy Compute
        run: |
          aws cloudformation deploy \
            --stack-name workshop-compute \
            --template-file cloudformation/compute.yaml
