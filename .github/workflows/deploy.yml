name: AWS Workshop Demo

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Validate Network
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/network.yaml

      - name: Validate Database
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/database.yaml

      - name: Validate Compute
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/compute.yaml

  deploy-network:

    needs: validate

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy Network
        run: |
          aws cloudformation deploy \
            --stack-name workshop-network \
            --template-file cloudformation/network.yaml

  deploy-database:

    needs: deploy-network

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy Database
        run: |
          aws cloudformation deploy \
            --stack-name workshop-database \
            --template-file cloudformation/database.yaml

  deploy-compute:

    needs: deploy-database

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy Compute
        run: |
          aws cloudformation deploy \
            --stack-name workshop-compute \
            --template-file cloudformation/compute.yaml
